<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membresías — GymCRUD</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .contenedor-pagina {
            width: 100%;
            max-width: 800px;
            padding: 28px 16px;
        }

        .barra-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .barra-superior h2 {
            font-size: 1.15rem;
            color: var(--color-amarillo-claro);
            font-weight: 700;
        }

        .formulario-inline {
            background: var(--color-superficie);
            border: 1px solid var(--color-borde);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 24px;
            display: none;
        }

        .formulario-inline.visible {
            display: block;
        }

        .formulario-inline h3 {
            font-size: 1rem;
            color: var(--color-amarillo-claro);
            margin-bottom: 14px;
        }

        .fila-campos {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .fila-campos .campo-formulario {
            flex: 1;
            min-width: 160px;
            margin-bottom: 0;
        }

        .fila-botones {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        a.volver {
            font-size: 0.85rem;
            color: var(--color-texto-medio);
            text-decoration: none;
        }

        a.volver:hover {
            color: var(--color-amarillo-claro);
        }

        .acciones {
            display: flex;
            gap: 8px;
        }
    </style>
</head>

<body>

    <div class="encabezado-pagina">
        <h1>GymCRUD — Membresías</h1>
        <p>Programación 2 (PR2) · Universidad Columbia del Paraguay</p>
    </div>

    <div class="contenedor-pagina">

        <div class="barra-superior">
            <h2>Listado de membresías</h2>
            <div style="display:flex; gap:12px; align-items:center;">
                <a href="/menu.html" class="volver">← Volver al menú</a>
                <button class="boton-principal" style="width:auto; padding:9px 18px;" onclick="mostrarFormulario()">+
                    Nueva membresía</button>
            </div>
        </div>

        <!-- Formulario alta / edición -->
        <div id="formularioMembresia" class="formulario-inline">
            <h3 id="tituloFormulario">Nueva membresía</h3>
            <input type="hidden" id="membresiaId">
            <div class="fila-campos">
                <input type="text" id="descripcion" class="campo-formulario" placeholder="Descripción (ej: Mensual)"
                    required>
                <input type="number" id="duracion" class="campo-formulario" placeholder="Duración (días)" min="1"
                    required>
                <input type="number" id="precio" class="campo-formulario" placeholder="Precio (Gs.)" min="0" required>
            </div>
            <div class="fila-botones">
                <button class="boton-principal" style="width:auto; padding:9px 18px;"
                    onclick="guardarMembresia()">Guardar</button>
                <button class="boton-secundario" onclick="ocultarFormulario()">Cancelar</button>
            </div>
        </div>

        <div id="areaDeResultado" class="area-mensaje"></div>

        <!-- Tabla -->
        <div class="contenedor-tabla">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Descripción</th>
                        <th>Duración (días)</th>
                        <th>Precio (Gs.)</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    <tr>
                        <td colspan="5" style="text-align:center; color:var(--color-texto-medio);">Cargando...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        const apiMembresias = '/api/membresias';
        let membresias = [];

        function mostrarMensaje(texto, tipo) {
            const area = document.getElementById('areaDeResultado');
            area.textContent = texto;
            area.className = 'area-mensaje ' + tipo;
            setTimeout(() => { area.className = 'area-mensaje'; }, 3000);
        }

        function mostrarFormulario(membresia = null) {
            document.getElementById('formularioMembresia').classList.add('visible');

            if (membresia) {
                document.getElementById('tituloFormulario').textContent = 'Editar membresía';
                document.getElementById('membresiaId').value = membresia.MEMBRESIA_ID;
                document.getElementById('descripcion').value = membresia.DESCRIPCION;
                document.getElementById('duracion').value = membresia.DURACION;
                document.getElementById('precio').value = membresia.PRECIO;
            } else {
                document.getElementById('tituloFormulario').textContent = 'Nueva membresía';
                document.getElementById('membresiaId').value = '';
                document.getElementById('descripcion').value = '';
                document.getElementById('duracion').value = '';
                document.getElementById('precio').value = '';
            }
        }

        function ocultarFormulario() {
            document.getElementById('formularioMembresia').classList.remove('visible');
        }

        async function cargarMembresias() {
            try {
                const respuesta = await fetch(apiMembresias);
                membresias = await respuesta.json();

                const cuerpo = document.getElementById('cuerpoTabla');
                cuerpo.innerHTML = '';

                if (membresias.length === 0) {
                    cuerpo.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--color-texto-medio);">No hay membresías registradas</td></tr>';
                    return;
                }

                membresias.forEach(m => {
                    const precioFormato = Number(m.PRECIO).toLocaleString('es-PY');
                    cuerpo.innerHTML += `
            <tr>
              <td>${m.MEMBRESIA_ID}</td>
              <td>${m.DESCRIPCION}</td>
              <td>${m.DURACION}</td>
              <td>Gs. ${precioFormato}</td>
              <td class="acciones">
                <button class="boton-secundario"
                        onclick="mostrarFormulario(membresias[${membresias.indexOf(m)}])">Editar</button>
                <button class="boton-peligro"
                        onclick="eliminarMembresia(${m.MEMBRESIA_ID})">Eliminar</button>
              </td>
            </tr>`;
                });

            } catch (err) {
                mostrarMensaje('Error al cargar membresías', 'error');
            }
        }

        async function guardarMembresia() {
            const id = document.getElementById('membresiaId').value;
            const descripcion = document.getElementById('descripcion').value.trim();
            const duracion = document.getElementById('duracion').value;
            const precio = document.getElementById('precio').value;

            if (!descripcion || !duracion || !precio) {
                mostrarMensaje('Todos los campos son obligatorios', 'error');
                return;
            }

            const datos = { descripcion, duracion, precio };
            const metodo = id ? 'PUT' : 'POST';
            const url = id ? `${apiMembresias}/${id}` : apiMembresias;

            try {
                const respuesta = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                const resultado = await respuesta.json();

                if (resultado.success) {
                    mostrarMensaje(resultado.message, 'exito');
                    ocultarFormulario();
                    cargarMembresias();
                } else {
                    mostrarMensaje(resultado.message, 'error');
                }

            } catch (err) {
                mostrarMensaje('Error al guardar membresía', 'error');
            }
        }

        async function eliminarMembresia(id) {
            if (!confirm('¿Eliminar esta membresía?')) return;

            try {
                const respuesta = await fetch(`${apiMembresias}/${id}`, { method: 'DELETE' });
                const resultado = await respuesta.json();

                if (resultado.success) {
                    mostrarMensaje(resultado.message, 'exito');
                    cargarMembresias();
                } else {
                    mostrarMensaje(resultado.message, 'error');
                }

            } catch (err) {
                mostrarMensaje('Error al eliminar membresía', 'error');
            }
        }

        cargarMembresias();
    </script>

</body>

</html>
